<div class="variable-modifier-container">
  <!-- Variable Definition Rows -->
  <div *ngFor="let variableDef of variableConfigDefs" class="variable-row">
    <mat-grid-list cols="5" rowHeight="85px" gutterSize="16px">
      <!-- Variable Name -->
      <mat-grid-tile>
        <mat-form-field appearance="outline">
          <mat-label>Variable Name</mat-label>
          <input type="text" matInput [formControl]="variableDef.varNameControl" [(ngModel)]="variableDef.varName" placeholder="e.g., userName">
        </mat-form-field>
      </mat-grid-tile>

      <!-- Variable Display Name -->
      <mat-grid-tile>
        <mat-form-field appearance="outline">
          <mat-label>Display Name</mat-label>
          <input type="text" matInput [formControl]="variableDef.varDisplayNameControl" [(ngModel)]="variableDef.varDisplayName" placeholder="e.g., User Name">
        </mat-form-field>
      </mat-grid-tile>

      <!-- Variable Type -->
      <mat-grid-tile>
        <mat-form-field appearance="outline">
          <mat-label>Type</mat-label>
          <mat-select [(ngModel)]="variableDef.varType">
            <mat-option *ngFor="let type of typesAllowed" [value]="type" (click)="setType(variableDef.varIndex, type)">
              {{type}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </mat-grid-tile>

      <!-- Reference Class (conditional — shown for Reference and Reference List) -->
      <mat-grid-tile *ngIf="variableDef.varType == 'Reference' || variableDef.varType == 'Reference List'">
        <mat-form-field appearance="outline" class="ref-class-field">
          <mat-label>Referenced Class</mat-label>
          <mat-select [(ngModel)]="variableDef.varRefClass" panelClass="ref-class-panel">
            <!-- Search input inside dropdown -->
            <div class="ref-class-search">
              <input matInput
                     [formControl]="getRefClassSearchControl(variableDef.varIndex)"
                     (input)="onRefClassSearchChange(variableDef.varIndex)"
                     (keydown)="$event.stopPropagation()"
                     placeholder="Search classes..."
                     class="ref-class-search-input">
            </div>

            <!-- Grouped class options -->
            <mat-optgroup *ngFor="let group of getFilteredClassGroups(variableDef.varIndex)"
                          [label]="group.label">
              <mat-option *ngFor="let cls of group.classes" [value]="cls.className">
                <span class="ref-class-option">
                  <span class="ref-class-category-dot"
                        [class.cat-custom]="cls.category === 'custom'"
                        [class.cat-module]="cls.category === 'materials_science'"
                        [class.cat-framework]="cls.category === 'framework'"></span>
                  <span class="ref-class-name">{{ cls.displayName }}</span>
                  <span class="ref-class-code" *ngIf="cls.displayName !== cls.className">{{ cls.className }}</span>
                </span>
              </mat-option>
            </mat-optgroup>

            <!-- Empty state -->
            <mat-option disabled *ngIf="getFilteredClassGroups(variableDef.varIndex).length === 0">
              No classes found
            </mat-option>
          </mat-select>
        </mat-form-field>
      </mat-grid-tile>

      <!-- Spacer for non-reference types -->
      <mat-grid-tile *ngIf="variableDef.varType != 'Reference' && variableDef.varType != 'Reference List'">
      </mat-grid-tile>

      <!-- Remove Button -->
      <mat-grid-tile>
        <button mat-raised-button class="remove-var-btn" (click)="removeVariable(variableDef.varIndex)" *ngIf="variableDef.varIndex != 1">
          Remove
        </button>
      </mat-grid-tile>
    </mat-grid-list>
  </div>

  <!-- Empty State -->
  <div class="no-variables" *ngIf="!variableConfigDefs || variableConfigDefs.length === 0">
    <p>No variables defined yet. Click "Add Variable" to get started.</p>
  </div>

  <!-- Add Variable Button -->
  <button id="new_variable_btn" mat-raised-button (click)="addVariableDef()">
    Add Variable
  </button>
</div>
