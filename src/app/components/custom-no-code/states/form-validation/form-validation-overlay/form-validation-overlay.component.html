<div class="form-validation-overlay" [attr.data-size-tier]="sizeTier">

  <form-validation-overlay-tiny
    *ngIf="sizeTier === 'tiny'"
    [displayName]="displayName"
    [enabledCount]="enabledCount">
  </form-validation-overlay-tiny>

  <form-validation-overlay-compact
    *ngIf="sizeTier === 'compact'"
    [displayName]="displayName"
    [fields]="fields"
    [enabledCount]="enabledCount"
    (fieldToggled)="onFieldToggle($event)">
  </form-validation-overlay-compact>

  <form-validation-overlay-full
    *ngIf="sizeTier === 'full'"
    [displayName]="displayName"
    [fields]="fields"
    [enabledCount]="enabledCount"
    [requiredCount]="requiredCount"
    (displayNameChanged)="onDisplayNameChange($event)"
    (fieldToggled)="onFieldToggle($event)"
    (fieldRequiredToggled)="onFieldRequiredToggle($event)"
    (fieldDebounceChanged)="onFieldDebounceChange($event)">
  </form-validation-overlay-full>

</div>
