<state-overlay-shell
  accent="#00BCD4"
  icon="checklist"
  [title]="displayName"
  [compact]="true"
  padding="4px 6px"
  [hasPopupView]="hasPopupView"
  (expandClicked)="onExpand()">

  <span headerExtras class="field-count" *ngIf="fields.length > 0">{{ enabledCount }}/{{ fields.length }}</span>

  <div class="chips" *ngIf="fields.length > 0">
    <button *ngFor="let field of fields"
            class="chip"
            [class.enabled]="field.enabled"
            [title]="field.displayName + ' — ' + (field.enabled ? 'enabled' : 'disabled')"
            (click)="onFieldToggle(field, $event)">
      <mat-icon class="chip-icon">{{ field.enabled ? 'check_circle' : 'radio_button_unchecked' }}</mat-icon>
      <span class="chip-label">{{ field.displayName }}</span>
    </button>
  </div>

  <div class="empty" *ngIf="fields.length === 0">
    <mat-icon>info_outline</mat-icon>
    <span>Connect upstream</span>
  </div>
</state-overlay-shell>
