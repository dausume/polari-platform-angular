<app-value-binding-shell
    [mode]="mode"
    [showHeader]="showHeader"
    [label]="label"
    [allowedBranches]="allowedBranches"
    [selectedBranch]="activeBranch"
    [compact]="compact"
    [disabled]="disabled"
    (branchChange)="onBranchChange($event)">

    <!-- Active branch is projected into the shell's content slot. -->

    <app-literal-branch
        *ngIf="activeBranch === 'literal'"
        [mode]="mode"
        [value]="directValue"
        [valueType]="directValueType"
        [disabled]="disabled"
        (selectionChange)="onLiteralChange($event)">
    </app-literal-branch>

    <app-from-upstream-branch
        *ngIf="activeBranch === 'from_upstream'"
        [slotIndex]="inputSlotIndex"
        [variableName]="inputVariableName"
        [availableInputs]="availableInputs"
        [disabled]="disabled"
        (selectionChange)="onUpstreamChange($event)">
    </app-from-upstream-branch>

    <app-from-object-branch
        *ngIf="activeBranch === 'from_object'"
        [mode]="mode"
        [objectPath]="objectPath"
        [sourceObjectFields]="sourceObjectFields"
        [lockedClass]="lockedClass"
        [lockedField]="lockedField"
        [allowAnyInstancePick]="allowAnyInstancePick"
        [disabled]="disabled"
        (selectionChange)="onObjectChange($event)">
    </app-from-object-branch>

    <app-from-dataset-branch
        *ngIf="activeBranch === 'from_dataset'"
        [mode]="mode"
        [datasetId]="datasetId"
        [fieldPath]="datasetFieldPath"
        [availableDatasets]="availableDatasets"
        [disabled]="disabled"
        (selectionChange)="onDatasetChange($event)">
    </app-from-dataset-branch>

</app-value-binding-shell>
